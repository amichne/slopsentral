name: Materialize Marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Materialize provider outputs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Refresh main
        if: github.ref_name == 'main'
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Install intelligence
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          release_dir="${RUNNER_TEMP}/intelligence-release"
          install_dir="${RUNNER_TEMP}/intelligence"
          mkdir -p "${release_dir}" "${install_dir}"

          gh release download \
            --repo amichne/intelligence \
            --pattern "intelligence-*-linux-x64.tar.gz" \
            --dir "${release_dir}"

          tar -xzf "${release_dir}"/intelligence-*-linux-x64.tar.gz -C "${install_dir}"
          chmod +x "${install_dir}/intelligence"
          echo "${install_dir}" >> "${GITHUB_PATH}"

      - name: Validate source marketplace
        run: intelligence validate --repo "${GITHUB_WORKSPACE}" --portable

      - name: Materialize provider outputs
        run: |
          set -euo pipefail

          out="${RUNNER_TEMP}/slopsentral-marketplace"
          intelligence marketplace materialize \
            --repo "${GITHUB_WORKSPACE}" \
            --provider all \
            --out "${out}"

          intelligence validate \
            --repo "${GITHUB_WORKSPACE}" \
            --portable \
            --hydrated "${out}"

          rm -rf .agents/plugins .github/plugin
          mkdir -p .agents .github
          cp -R "${out}/.agents/plugins" .agents/plugins
          cp -R "${out}/.github/plugin" .github/plugin

          intelligence validate \
            --repo "${GITHUB_WORKSPACE}" \
            --portable \
            --hydrated "${GITHUB_WORKSPACE}"

      - name: Commit generated outputs
        run: |
          set -euo pipefail

          if git diff --quiet -- .agents/plugins .github/plugin; then
            echo "Marketplace provider outputs are already up to date."
            exit 0
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/${GITHUB_REF_NAME}")" ]; then
            echo "::notice::${GITHUB_REF_NAME} advanced while materializing; a newer workflow run will publish the latest outputs."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .agents/plugins .github/plugin
          git diff --cached --check
          git commit -m "chore: materialize marketplace outputs"
          git push origin "HEAD:${GITHUB_REF_NAME}"
