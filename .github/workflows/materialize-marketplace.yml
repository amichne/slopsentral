name: Materialize Marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-marketplace-${{ github.ref }}
  cancel-in-progress: true

jobs:
  materialize:
    name: Materialize provider outputs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Refresh main
        if: github.ref_name == 'main'
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Validate source marketplace
        run: |
          set -euo pipefail
          node source/tools/validate-source-graph.mjs

      - name: Project Codex marketplace
        id: codex_projection
        uses: amichne/intelligence@v0.2.8
        with:
          source: .
          harness: codex
          version: v0.2.8

      - name: Project GitHub Copilot marketplace
        id: github_copilot_projection
        uses: amichne/intelligence@v0.2.8
        with:
          source: .
          harness: github-copilot
          version: v0.2.8

      - name: Materialize provider outputs
        env:
          CODEX_PROJECTION: ${{ steps.codex_projection.outputs.projection-path }}
          GITHUB_COPILOT_PROJECTION: ${{ steps.github_copilot_projection.outputs.projection-path }}
        run: |
          set -euo pipefail

          test -d "${CODEX_PROJECTION}/.agents/plugins"
          test -d "${GITHUB_COPILOT_PROJECTION}/.github/plugin"

          rm -rf .agents/plugins .github/plugin
          mkdir -p .agents .github
          cp -R "${CODEX_PROJECTION}/.agents/plugins" .agents/plugins
          cp -R "${GITHUB_COPILOT_PROJECTION}/.github/plugin" .github/plugin

          diff -qr "${CODEX_PROJECTION}/.agents/plugins" .agents/plugins
          diff -qr "${GITHUB_COPILOT_PROJECTION}/.github/plugin" .github/plugin

      - name: Commit generated outputs
        run: |
          set -euo pipefail

          if git diff --quiet -- .agents/plugins .github/plugin; then
            echo "Marketplace provider outputs are already up to date."
            exit 0
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/${GITHUB_REF_NAME}")" ]; then
            echo "::notice::${GITHUB_REF_NAME} advanced while materializing; a newer workflow run will publish the latest outputs."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .agents/plugins .github/plugin
          git diff --cached --check
          git commit -m "chore: materialize marketplace outputs"
          git push origin "HEAD:${GITHUB_REF_NAME}"
