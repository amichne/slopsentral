name: Materialize Marketplace

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: materialize-marketplace-${{ github.ref }}
  cancel-in-progress: true

env:
  INTELLIGENCE_VERSION: v0.2.7

jobs:
  materialize:
    name: Materialize provider outputs
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ github.ref_name }}

      - name: Refresh main
        if: github.ref_name == 'main'
        run: git pull --ff-only origin "${GITHUB_REF_NAME}"

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install intelligence
        uses: ./.github/actions/setup-intelligence
        with:
          version: ${{ env.INTELLIGENCE_VERSION }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate source marketplace
        run: |
          set -euo pipefail
          node source/tools/validate-source-graph.mjs

      - name: Materialize provider outputs
        run: |
          set -euo pipefail

          out="${RUNNER_TEMP}/slopsentral-marketplace"
          intelligence project \
            --source "${GITHUB_WORKSPACE}" \
            --harness codex \
            --out "${out}/codex"
          intelligence project \
            --source "${GITHUB_WORKSPACE}" \
            --harness github-copilot \
            --out "${out}/github-copilot"

          test -d "${out}/codex/.agents/plugins"
          test -d "${out}/github-copilot/.github/plugin"

          rm -rf .agents/plugins .github/plugin
          mkdir -p .agents .github
          cp -R "${out}/codex/.agents/plugins" .agents/plugins
          cp -R "${out}/github-copilot/.github/plugin" .github/plugin

          diff -qr "${out}/codex/.agents/plugins" .agents/plugins
          diff -qr "${out}/github-copilot/.github/plugin" .github/plugin

      - name: Commit generated outputs
        run: |
          set -euo pipefail

          if git diff --quiet -- .agents/plugins .github/plugin; then
            echo "Marketplace provider outputs are already up to date."
            exit 0
          fi

          git fetch origin "${GITHUB_REF_NAME}"
          if [ "$(git rev-parse HEAD)" != "$(git rev-parse "origin/${GITHUB_REF_NAME}")" ]; then
            echo "::notice::${GITHUB_REF_NAME} advanced while materializing; a newer workflow run will publish the latest outputs."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A .agents/plugins .github/plugin
          git diff --cached --check
          git commit -m "chore: materialize marketplace outputs"
          git push origin "HEAD:${GITHUB_REF_NAME}"
