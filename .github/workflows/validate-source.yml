name: Validate Source

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: validate-source-${{ github.ref }}
  cancel-in-progress: true

env:
  INTELLIGENCE_VERSION: v0.2.7

jobs:
  validate:
    name: Validate marketplace source
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Install intelligence
        uses: ./.github/actions/setup-intelligence
        with:
          version: ${{ env.INTELLIGENCE_VERSION }}
        env:
          GH_TOKEN: ${{ github.token }}

      - name: Validate source graph and evals
        run: |
          set -euo pipefail

          node source/tools/validate-source-graph.mjs
          node source/tools/run-routing-evals.mjs --require-all-observed
          node source/skills/manage-json-schemas/scripts/schema-contracts.js \
            policy \
            --schema source/schemas/runtime/runtime-links.schema.json
          node source/skills/manage-json-schemas/scripts/schema-contracts.js \
            policy \
            --schema source/schemas/evals/routing-field-observations.schema.json

      - name: Validate Pkl engineering facade
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          python3 -m unittest discover \
            -s source/skills/pkl-engineering/scripts/tests \
            -p 'test_*.py' \
            -v

          pkl_dir="${RUNNER_TEMP}/pkl-0.32.0"
          mkdir -p "${pkl_dir}"
          gh release download 0.32.0 \
            --repo apple/pkl \
            --pattern jpkl \
            --dir "${pkl_dir}"
          chmod +x "${pkl_dir}/jpkl"

          facade="source/skills/pkl-engineering/scripts/pkl_agent"
          fixture="${RUNNER_TEMP}/pkl-agent-fixture"
          mkdir -p "${fixture}"
          cp -R source/skills/pkl-engineering/scripts/tests/fixtures/project/. "${fixture}/"
          common=(--workspace "${fixture}" --pkl-bin "${pkl_dir}/jpkl")

          home_toon="${RUNNER_TEMP}/pkl-agent-home.toon"
          "${facade}" "${common[@]}" > "${home_toon}"
          "${facade}" "${common[@]}" format check --all
          "${facade}" "${common[@]}" imports config.pkl
          "${facade}" "${common[@]}" module validate config.pkl
          "${facade}" "${common[@]}" module inspect config.pkl --expression service.port
          "${facade}" "${common[@]}" module render config.pkl \
            --format json \
            --out build/config.json
          "${facade}" "${common[@]}" test run
          "${facade}" "${common[@]}" project resolve
          "${facade}" "${common[@]}" package verify
          python3 -m json.tool "${fixture}/build/config.json" > /dev/null

          npx --yes @toon-format/cli@2.3.0 \
            "${home_toon}" \
            --output "${RUNNER_TEMP}/pkl-agent-home.json"
          python3 -m json.tool "${RUNNER_TEMP}/pkl-agent-home.json" > /dev/null

      - name: Validate marketplace materialization
        run: |
          set -euo pipefail

          out="${RUNNER_TEMP}/slopsentral-marketplace"
          intelligence project \
            --source "${GITHUB_WORKSPACE}" \
            --harness codex \
            --out "${out}/codex"
          intelligence project \
            --source "${GITHUB_WORKSPACE}" \
            --harness github-copilot \
            --out "${out}/github-copilot"

          test -d "${out}/codex/.agents/plugins"
          test -d "${out}/github-copilot/.github/plugin"
