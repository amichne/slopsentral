name: Set up Intelligence
description: Install one pinned Intelligence release for repository workflows.

inputs:
  version:
    description: Immutable Intelligence release tag, including the v prefix.
    required: true

runs:
  using: composite
  steps:
    - name: Download and verify Intelligence
      shell: bash
      run: |
        set -euo pipefail

        version="${{ inputs.version }}"
        if [[ ! "${version}" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
          echo "Invalid Intelligence release tag: ${version}" >&2
          exit 2
        fi

        release_dir="${RUNNER_TEMP}/intelligence-release"
        install_dir="${RUNNER_TEMP}/intelligence-install"
        asset="intelligence-${version}.tar.gz"
        mkdir -p "${release_dir}" "${install_dir}"

        gh release download "${version}" \
          --repo amichne/intelligence \
          --pattern "${asset}" \
          --pattern SHA256SUMS \
          --dir "${release_dir}"

        (cd "${release_dir}" && sha256sum --check --strict SHA256SUMS)
        tar -xzf "${release_dir}/${asset}" -C "${install_dir}"
        binary="${install_dir}/intelligence/bin/intelligence"
        if [[ ! -x "${binary}" ]]; then
          echo "Intelligence archive did not contain executable ${binary}" >&2
          exit 1
        fi

        "${binary}" --version
        echo "${install_dir}/intelligence/bin" >> "${GITHUB_PATH}"
