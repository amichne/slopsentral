openapi: 3.1.0
info:
  title: Typed Error And Collection Contract Examples
  version: 0.1.0
  description: OpenAPI examples for typed pages, maps, errors, and security without semantic nulls.
x-contract-policy:
  semanticNull: forbidden
paths:
  /orders:
    get:
      operationId: listOrders
      tags:
        - Orders
      summary: List orders for a tenant.
      parameters:
        - name: tenantId
          in: query
          required: true
          schema:
            $ref: "#/components/schemas/TenantId"
        - name: pageSize
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - name: cursor
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/CursorToken"
      responses:
        "200":
          description: Orders page.
          headers:
            X-Correlation-Id:
              required: true
              schema:
                $ref: "#/components/schemas/CorrelationId"
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrderPage"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
      security:
        - bearerAuth:
            - orders:read
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
  responses:
    BadRequest:
      description: Request failed validation.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingTenant:
              value:
                type: API_ERROR
                code: VALIDATION_FAILED
                message: tenantId is required.
                correlationId: req_01HZX8B7Y01E0EXAMPLE00001
                fields:
                  - path: /tenantId
                    code: REQUIRED
                    message: tenantId is required.
    Unauthorized:
      description: Authentication failed or bearer token is missing.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ApiError"
          examples:
            missingToken:
              value:
                type: API_ERROR
                code: UNAUTHORIZED
                message: Bearer token is required.
                correlationId: req_01HZX8B7Y01E0EXAMPLE00002
                fields: []
  schemas:
    TenantId:
      type: string
      pattern: "^tenant_[a-z0-9][a-z0-9-]{1,62}$"
      examples:
        - tenant_acme-ops
    CursorToken:
      type: string
      pattern: "^cur_[A-Za-z0-9_-]{24,256}$"
      examples:
        - cur_U3RhYmxlUGFnZUN1cnNvcl92MQ
    CorrelationId:
      type: string
      pattern: "^req_[0-9A-HJKMNP-TV-Z]{26}$"
      examples:
        - req_01HZX8B7Y01E0EXAMPLE00003
    Metadata:
      type: object
      description: User-defined metadata with constrained keys and values.
      propertyNames:
        pattern: "^[a-z][a-z0-9_]{0,39}$"
      additionalProperties:
        type: string
        minLength: 1
        maxLength: 200
      examples:
        - owner: platform
          cost_center: cc_1234
    OrderSummary:
      type: object
      additionalProperties: false
      required:
        - type
        - id
        - tenantId
        - status
        - metadata
      properties:
        type:
          type: string
          enum:
            - ORDER_SUMMARY
        id:
          type: string
          pattern: "^ord_[0-9A-HJKMNP-TV-Z]{26}$"
          examples:
            - ord_01HZX7Q9WVJXK6SC2H0MX7J5PG
        tenantId:
          $ref: "#/components/schemas/TenantId"
        status:
          type: string
          enum:
            - PENDING
            - CONFIRMED
            - CANCELLED
        metadata:
          $ref: "#/components/schemas/Metadata"
    OrderPage:
      type: object
      additionalProperties: false
      required:
        - type
        - items
        - hasMore
      properties:
        type:
          type: string
          enum:
            - ORDER_PAGE
        items:
          type: array
          minItems: 0
          maxItems: 200
          items:
            $ref: "#/components/schemas/OrderSummary"
        nextCursor:
          $ref: "#/components/schemas/CursorToken"
        hasMore:
          type: boolean
          description: True when the server has more items after this page.
    ApiError:
      type: object
      additionalProperties: false
      required:
        - type
        - code
        - message
        - correlationId
        - fields
      properties:
        type:
          type: string
          enum:
            - API_ERROR
        code:
          type: string
          enum:
            - VALIDATION_FAILED
            - UNAUTHORIZED
            - NOT_FOUND
            - RATE_LIMITED
            - CONFLICT
        message:
          type: string
          minLength: 1
          maxLength: 500
        correlationId:
          $ref: "#/components/schemas/CorrelationId"
        retryAfterSeconds:
          type: integer
          minimum: 1
        fields:
          type: array
          items:
            $ref: "#/components/schemas/FieldError"
    FieldError:
      type: object
      additionalProperties: false
      required:
        - path
        - code
        - message
      properties:
        path:
          type: string
          pattern: "^/[A-Za-z0-9_/-]*$"
          examples:
            - /tenantId
        code:
          type: string
          enum:
            - REQUIRED
            - MALFORMED
            - OUT_OF_RANGE
            - UNKNOWN_VALUE
        message:
          type: string
          minLength: 1
          maxLength: 300
