openapi: 3.1.0
info:
  title: Discriminated Variant Contract Examples
  version: 0.1.0
  description: OpenAPI examples for explicit variants and nested subtype state without semantic nulls.
x-contract-policy:
  semanticNull: forbidden
  discriminatorField: type
paths: {}
components:
  schemas:
    PaymentMethod:
      oneOf:
        - $ref: "#/components/schemas/CardPaymentMethod"
        - $ref: "#/components/schemas/BankPaymentMethod"
      discriminator:
        propertyName: type
        mapping:
          CARD: "#/components/schemas/CardPaymentMethod"
          BANK: "#/components/schemas/BankPaymentMethod"
    CardPaymentMethod:
      type: object
      additionalProperties: false
      required:
        - type
        - cardToken
        - last4
      properties:
        type:
          type: string
          enum:
            - CARD
        cardToken:
          type: string
          pattern: "^card_[A-Za-z0-9]{24,80}$"
          examples:
            - card_2a6b8c9d0e1f2a3b4c5d6e7f
        last4:
          type: string
          pattern: "^[0-9]{4}$"
          examples:
            - "4242"
    BankPaymentMethod:
      type: object
      additionalProperties: false
      required:
        - type
        - accountToken
        - routingNumberLast4
      properties:
        type:
          type: string
          enum:
            - BANK
        accountToken:
          type: string
          pattern: "^bank_[A-Za-z0-9]{24,80}$"
          examples:
            - bank_2a6b8c9d0e1f2a3b4c5d6e7f
        routingNumberLast4:
          type: string
          pattern: "^[0-9]{4}$"
          examples:
            - "0210"
    JobEvent:
      type: object
      additionalProperties: false
      required:
        - type
        - id
        - occurredAt
        - job
      properties:
        type:
          type: string
          enum:
            - JOB
        id:
          type: string
          pattern: "^evt_[0-9A-HJKMNP-TV-Z]{26}$"
          examples:
            - evt_01HZX82ZNWQ6EV7M5CXKV3T9QF
        occurredAt:
          type: string
          format: date-time
          examples:
            - "2026-05-26T14:15:22Z"
        job:
          oneOf:
            - $ref: "#/components/schemas/JobStarted"
            - $ref: "#/components/schemas/JobFailed"
          discriminator:
            propertyName: type
            mapping:
              STARTED: "#/components/schemas/JobStarted"
              FAILED: "#/components/schemas/JobFailed"
    JobStarted:
      type: object
      additionalProperties: false
      required:
        - type
        - workerId
      properties:
        type:
          type: string
          enum:
            - STARTED
        workerId:
          type: string
          pattern: "^worker_[a-z0-9-]{3,64}$"
          examples:
            - worker_ingest-7
    JobFailed:
      type: object
      additionalProperties: false
      required:
        - type
        - failure
      properties:
        type:
          type: string
          enum:
            - FAILED
        failure:
          type: object
          additionalProperties: false
          required:
            - code
            - message
          properties:
            code:
              type: string
              enum:
                - TIMEOUT
                - VALIDATION_FAILED
                - DEPENDENCY_UNAVAILABLE
            message:
              type: string
              minLength: 1
              maxLength: 500
              examples:
                - Upstream validation service timed out.
